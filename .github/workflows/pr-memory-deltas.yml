name: Calculate memory deltas

on:
  - push
  - pull_request

env:
  SKETCHES_REPORTS_PATH: sketches-reports
  COMMON_LIB_DEPS: | 
    - name: SimplyAtomic
      version: "1.0"
    - name: avr-fast-shift
      version: "1.1.0"
    - name: libdivide
      version: "5.2.0"
    - name: FastCRC
      version: "1.41"
    - name: avr-fast-div
      version: "1.4.0"
  # Paths changed to use absolute context variables to solve path resolution bugs
  COMMON_BUILD_FLAGS: "-I${{ github.workspace }}/speeduino/ -I${{ github.workspace }}/src/ -I${{ github.workspace }}/lib/"

jobs:
  compile:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        board:
          - fqbn: arduino:avr:mega
            artifact-name-suffix: arduino-avr-mega
            family-name: arduino:avr
            platform: |
              - name: arduino:avr
            compile-flags: -DPLATFORMIO -DUSE_LIBDIVIDE -DCRC_BIGTABLES=0 -DAFD_INLINE=0 -O3 -ffast-math -fshort-enums -funroll-loops -Wall -Wextra -std=c++14
            lib_deps: |
              - name: Time

          - fqbn: teensy:avr:teensy35
            artifact-name-suffix: teensy-avr-teensy35
            platform: |
              - source-url: https://pjrc.com
                name: teensy:avr
            compile-flags: -Wall
            lib_deps: |
              - name: SDfat
              - name: InternalTemperature
              - name: elapsedMillis
              
          - fqbn: teensy:avr:teensy41
            artifact-name-suffix: teensy-avr-teensy41
            platform: |
              - source-url: https://pjrc.com
                name: teensy:avr
            compile-flags: -Wall
            lib_deps: |
              - name: SDfat
              - name: InternalTemperature
              - name: elapsedMillis
          
          - fqbn: STMicroelectronics:stm32:GenF4
            artifact-name-suffix: stm32-avr-stm32f4
            platform: |
              - source-url: https://github.com
                name: STMicroelectronics:stm32
                version: 2.7.1
            compile-flags: -DUSE_LIBDIVIDE -DUSBCON -DUSBD_USE_CDC -DHAL_PCD_MODULE_ENABLED -DHAL_CAN_MODULE_ENABLED -DSERIAL_TX_BUFFER_SIZE=128 -DSERIAL_RX_BUFFER_SIZE=128 -std=gnu++14 -UBOARD_MAX_IO_PINS
            lib_deps: |
              - name: "STM32duino RTC"
                version: 1.2.0
              - name: SdFat
              - name: elapsedMillis

          # Updated RP2040 core configuration parameters for 133MHz clock profile
          - fqbn: rp2040:rp2040:vccgnd_yd_rp2040:freq=133
            artifact-name-suffix: rp2040-avr-rp2040
            platform: |
              - source-url: https://github.com
                name: rp2040:rp2040
            compile-flags: -DARDUINO_ARCH_RP2040 -DF_CPU=133000000L -O3
            lib_deps: |
              # No special hardware libraries required
            build_settings:
            build_src_filter: +<*> -<src/SPIAsEEPROM/> +<src/rp2040_io/>

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4     

      - name: Add Poetry to PATH (Local Act Fix)
        if: ${{ env.ACT }}
        run: echo "/root/.local/bin" >> $GITHUB_PATH

      - name: Compile platforms
        uses: arduino/compile-sketches@v1.1.2
        with:
          fqbn: ${{ matrix.board.fqbn }}
          enable-deltas-report: ${{ !env.ACT }}
          verbose: true
          sketches-report-path: ${{ env.SKETCHES_REPORTS_PATH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sketch-paths: |
            - speeduino/speeduino.ino
          platforms: |
            ${{ matrix.board.platform }}
          cli-compile-flags: | 
            - --clean
            - --build-property 
            - "build.extra_flags=${{ env.COMMON_BUILD_FLAGS }} ${{ matrix.board.compile-flags }}"
          libraries: |
            ${{ matrix.board.lib_deps }}
            ${{ env.COMMON_LIB_DEPS }}

      - name: Upload sketches report to workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sketches-report-${{ matrix.board.artifact-name-suffix }}
          path: ${{ env.SKETCHES_REPORTS_PATH }}
